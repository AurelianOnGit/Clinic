<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>{% block title %}Clinic App{% endblock %}</title>
    </head>
    <body>
        <p>Welcome! You can book appointments on this site.</p>
        <div class="AP_List">
            <ol style="list-style-type: none; padding-left: 0;">
                {% for appointment in appointments %}
                    <li>Token #{{ appointment.token }} — {{ appointment.name }}</li>
                {% endfor %}
            </ol>
        </div>
    </body>
</html>
