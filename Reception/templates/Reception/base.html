<!DOCTYPE html>
<html lang="en">
    <head>
        {% load static %}
        <link rel="stylesheet" href="{% static 'Reception/css/style.css' %}">
        <link rel="stylesheet" href="{% static 'Reception/css/form.css' %}">
        <link href="https://fonts.cdnfonts.com/css/coca-cola" rel="stylesheet">
        <title>{% block title %}Clinic App{% endblock %}</title>
    </head>
    <body>
        <header class="nav-bar">
            <div class="logo">
                <img id="logo-img" src="{% static 'Reception/images/logo.png' %}" alt="Clinic Logo">
            </div>
            <div class="clinic-name">
                <h5>Clinic Name</h5>
            </div>
            <div class="login-wrapper">
                <button class="login-btn" type="button"><h5>Login | Sign Up</h5></button>
            </div>
        </header>
            {% block content %}
            {% endblock %}
            {% block extra_js %}
            {% endblock %}
        <footer>
            <h1>Placeholder</h1>
        </footer>
    </body>
</html>
