<!DOCTYPE html>
<html lang="en">
    <head>
        {% load static %}
        <meta charset="UTF-8">
        <link rel="stylesheet" href="{% static 'Reception/css/style.css' %}">
        <link rel="stylesheet" href="{% static 'Reception/css/form.css' %}">
        <script>
            function backToHome() {
                setTimeout(function() {
                    window.location.href = "{% url 'home' %}";
                }, 1500);
            }
        </script>
    </head>
    <body>
        <img src="{% static 'Reception/images/ClinicFront.jpg' %}">
        <div class="form-container">
            <form class="book-today-form" method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="button-container">
                    <button class="submit-today-btn" type="submit">Book</button>
                    <button onclick="backToHome()" class="cancel-btn" type="button">Cancel</button>
                </div>
                {% if success %}
                    <div id="success-box">
                        <div class="content">
                            <h4>Booking Successful</h4>
                            <h5>You will be redirected shortly...</h5>
                        </div>
                    </div>
                    <script>
                        setTimeout(() => {
                            window.location.href = "{% url 'home' %}";
                        }, 2000);
                    </script>
                {% endif %}
            </form>
        </div>
    </body>
</html>
